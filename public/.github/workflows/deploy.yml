name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-south1
  ARTIFACT_REGISTRY: his-website
  CLOUD_RUN_SERVICE: his-website

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate to Google Cloud using Workload Identity
      # Required secrets:
      #   - GCP_PROJECT_ID: Your GCP project ID (e.g., "my-project-123")
      #   - GCP_SA_KEY: Service account key JSON (from GCP Console > IAM > Service Accounts)
      #   Create workload identity: https://cloud.google.com/iam/docs/workload-identity-federation
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Configure Docker to use Artifact Registry
      # Repository: asia-south1-docker.pkg.dev/{PROJECT_ID}/his-website
      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      # Build and push Docker image to Artifact Registry
      # Image: asia-south1-docker.pkg.dev/{PROJECT_ID}/his-website/deploy:${{ github.sha }}
      - name: Build and push image
        run: |
          docker build -t asia-south1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/deploy:${{ github.sha }} .
          docker push asia-south1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/deploy:${{ github.sha }}

      # Deploy to Cloud Run
      # Service: his-website in region asia-south1 (Mumbai/Bangalore)
      # Uses nginx:alpine, port 8080, no authentication (public)
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: asia-south1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/deploy:${{ github.sha }}
          flags: "--allow-unauthenticated --port=8080 --cpu=1 --memory=512Mi --min-instances=0 --max-instances=10"

      - name: Show deployed URL
        run: |
          echo "Deployed to: $(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} --region=${{ env.GCP_REGION }} --format='value(status.url)')"